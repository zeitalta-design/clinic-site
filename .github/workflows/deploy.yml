name: Build & Deploy to Lolipop

on:
  push:
    branches: [main]
  # microCMS Webhook からの手動トリガー（お知らせ更新時）
  repository_dispatch:
    types: [microcms_update]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Export
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
        run: npm run build

      - name: Deploy to Lolipop via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LOLIPOP_FTP_HOST }}
          username: ${{ secrets.LOLIPOP_FTP_USERNAME }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          local-dir: out/
          server-dir: ${{ secrets.LOLIPOP_FTP_TARGET_DIR }}
          protocol: ftps
          dangerous-clean-slate: false
